<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>ApexBits | Program-wise Syllabus PDFs</title>
  <meta name="description" content="Search and open BITS program-wise syllabus PDFs for B.E. and Msc programmes." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
:root {
  --bg: #08090d;
  --panel: rgba(17, 20, 29, 0.82);
  --panel-strong: rgba(21, 25, 36, 0.96);
  --text: #f7f7fb;
  --muted: #a3a8b8;
  --faint: #73798b;
  --line: rgba(255, 255, 255, 0.09);
  --accent: #aaff32;
  --accent-2: #7c5cff;
  --accent-3: #35d8ff;
  --accent-soft: rgba(170, 255, 50, 0.12);
  --shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
  --radius: 26px;
}

* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: var(--text);
  background:
    radial-gradient(circle at 6% 8%, rgba(170, 255, 50, 0.10), transparent 27rem),
    radial-gradient(circle at 92% 28%, rgba(124, 92, 255, 0.16), transparent 29rem),
    radial-gradient(circle at 50% 110%, rgba(53, 216, 255, 0.08), transparent 31rem),
    linear-gradient(180deg, #090a0f 0%, #07080c 100%);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.026) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.026) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: linear-gradient(to bottom, black, transparent 80%);
}
.glow {
  position: fixed;
  width: 360px;
  height: 360px;
  border-radius: 999px;
  filter: blur(70px);
  opacity: 0.16;
  pointer-events: none;
  z-index: -1;
}
.glow-one { background: var(--accent); top: 5%; left: -120px; }
.glow-two { background: var(--accent-2); right: -140px; top: 34%; }

.nav {
  width: min(1180px, calc(100% - 32px));
  margin: 18px auto 0;
  padding: 12px 14px;
  position: sticky;
  top: 14px;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(10, 12, 18, 0.74);
  backdrop-filter: blur(18px);
  border: 1px solid var(--line);
  border-radius: 999px;
}
.brand, .nav-links a, .button { color: var(--text); text-decoration: none; }
.brand { display: inline-flex; align-items: center; gap: 10px; font-weight: 900; letter-spacing: -0.03em; }
.brand-mark {
  position: relative;
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border-radius: 14px;
  overflow: hidden;
  background:
    radial-gradient(circle at 72% 24%, rgba(255,255,255,0.85), transparent 0 9%, transparent 10%),
    linear-gradient(135deg, var(--accent) 0%, #d9ff63 42%, var(--accent-2) 100%);
  color: #101406;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.16), 0 12px 28px rgba(170,255,50,0.22), inset 0 1px 0 rgba(255,255,255,0.42);
  transform: rotate(-7deg);
}
.brand-mark::before { content: ""; position: absolute; inset: 6px; border-radius: 10px; border: 2px solid rgba(8, 9, 13, 0.58); transform: rotate(7deg); }
.logo-peak { position: absolute; width: 20px; height: 20px; border-left: 5px solid #101406; border-top: 5px solid #101406; transform: translateY(4px) rotate(45deg); border-radius: 3px 0 0 0; }
.logo-peak::after { content: ""; position: absolute; width: 15px; height: 5px; border-radius: 999px; background: #101406; left: 2px; top: 7px; transform: rotate(-45deg); }
.logo-spark { position: absolute; right: 8px; top: 7px; width: 6px; height: 6px; border-radius: 50%; background: #101406; box-shadow: 0 0 0 3px rgba(16,20,6,0.18); }
.nav-links { display: flex; gap: 6px; }
.nav-links a { padding: 10px 14px; border-radius: 999px; color: var(--muted); font-size: 14px; transition: background 180ms ease, color 180ms ease; }
.nav-links a:hover, .nav-links a.active { color: var(--text); background: rgba(255,255,255,0.06); }

main { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
.hero { padding: 86px 0 24px; }
.eyebrow { margin: 0 0 14px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.14em; font-size: 12px; font-weight: 900; }
h1, h2, h3, p { margin-top: 0; }
h1 { max-width: 960px; margin-bottom: 18px; font-size: clamp(46px, 7vw, 86px); line-height: 0.94; letter-spacing: -0.08em; }
.hero-copy { max-width: 760px; color: var(--muted); font-size: clamp(17px, 2vw, 20px); line-height: 1.7; }
/* Syllabus page intentionally keeps the hero minimal; cards carry the visual identity. */

.controls { padding: 18px; margin: 8px 0 22px; }
.control-row { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: end; }
.search-box { display: grid; gap: 8px; color: var(--muted); font-size: 13px; font-weight: 800; }
.search-box input {
  width: 100%;
  height: 54px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 0 18px;
  background: rgba(255,255,255,0.055);
  color: var(--text);
  outline: none;
  font: inherit;
}
.search-box input:focus { border-color: rgba(170,255,50,0.55); box-shadow: 0 0 0 4px var(--accent-soft); }
.count-pill { white-space: nowrap; height: 54px; display: inline-flex; align-items: center; padding: 0 18px; border-radius: 999px; border: 1px solid rgba(170,255,50,0.22); background: var(--accent-soft); color: var(--accent); font-weight: 900; }


.syllabus-list { display: grid; gap: 14px; margin: 18px 0 64px; }
.syllabus-row {
  position: relative;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 20px;
  min-height: 118px;
  padding: 22px 24px;
  color: var(--text);
  text-decoration: none;
  background: linear-gradient(135deg, rgba(17, 20, 29, 0.88), rgba(17, 20, 29, 0.58));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  backdrop-filter: blur(22px);
  overflow: hidden;
  transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
}
.syllabus-row::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 5px;
  background: linear-gradient(180deg, var(--card-accent, var(--accent)), var(--accent-3));
  opacity: 0.95;
}
.syllabus-row::after {
  content: "";
  position: absolute;
  right: -80px;
  top: -110px;
  width: 260px;
  height: 260px;
  border-radius: 999px;
  background: color-mix(in srgb, var(--card-accent, var(--accent)) 18%, transparent);
  filter: blur(4px);
  transition: opacity 180ms ease, transform 180ms ease;
}
.syllabus-row:hover {
  transform: translateY(-2px);
  border-color: color-mix(in srgb, var(--card-accent, var(--accent)) 42%, rgba(255,255,255,0.14));
  background: linear-gradient(135deg, rgba(20, 24, 34, 0.96), rgba(17, 20, 29, 0.70));
}
.syllabus-row:hover::after { opacity: 1; transform: scale(1.06); }
.branch-icon {
  position: relative;
  z-index: 1;
  width: 58px;
  height: 58px;
  border-radius: 18px;
  display: grid;
  place-items: center;
  color: #101406;
  background: linear-gradient(135deg, var(--card-accent, var(--accent)), #d9ff63);
  box-shadow: 0 16px 36px rgba(170,255,50,0.16), inset 0 1px 0 rgba(255,255,255,0.38);
  border: 1px solid rgba(255,255,255,0.18);
}
.branch-icon svg {
  width: 34px;
  height: 34px;
  display: block;
  stroke: currentColor;
  fill: none;
  stroke-width: 2.25;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.branch-icon .svg-fill { fill: currentColor; stroke: none; }
.branch-copy { position: relative; z-index: 1; }
.branch-copy h2 { margin: 0 0 8px; font-size: clamp(25px, 3vw, 38px); letter-spacing: -0.06em; }
.branch-copy p { margin: 0; color: var(--muted); line-height: 1.55; max-width: 720px; }
.branch-type { color: var(--card-accent, var(--accent)); font-weight: 900; }
.branch-meta { position: relative; z-index: 1; display: flex; align-items: center; gap: 12px; color: var(--card-accent, var(--accent)); font-weight: 900; white-space: nowrap; }
.branch-meta span { padding: 9px 12px; border-radius: 999px; background: rgba(170,255,50,0.10); border: 1px solid rgba(170,255,50,0.20); }

.empty { padding: 26px; color: var(--muted); grid-column: 1 / -1; }

@media (max-width: 820px) {
  .nav { align-items: stretch; border-radius: 24px; flex-direction: column; gap: 10px; }
  .nav-links { display: grid; grid-template-columns: repeat(5, 1fr); }
  .nav-links a { text-align: center; }
  .hero { padding-top: 62px; }
  .hero-panel, .control-row { grid-template-columns: 1fr; }
  h1 { font-size: clamp(42px, 12vw, 68px); }
}
@media (max-width: 720px) {
  .syllabus-row { grid-template-columns: 1fr; gap: 14px; padding: 22px; }
  .branch-meta { justify-content: space-between; }
  .branch-icon { width: 52px; height: 52px; }
}
  </style>
</head>
<body>
  <div class="glow glow-one"></div>
  <div class="glow glow-two"></div>

  <header class="nav">
    <a class="brand" href="index.html" aria-label="ApexBits home">
      <span class="brand-mark" aria-hidden="true"><span class="logo-peak"></span><span class="logo-spark"></span></span>
      <span>ApexBits</span>
    </a>
        <nav class="nav-links" aria-label="Site sections">
      <a href="index.html">Cutoffs</a>
      <a class="active" href="syllabus.html">Syllabus</a>
      <a href="fees.html">Fees</a>
      <a href="upcoming-bits-events.html">Upcoming</a>
      <a href="info.html">Vault</a>
    </nav>
  </header>

  <main id="top">
    <section class="hero">
      <p class="eyebrow">Program-wise resources</p>
      <h1>Syllabus PDFs</h1>
    </section>

    <section class="controls" id="branches">
      <div class="control-row" aria-label="Syllabus controls">
        <label class="search-box">
          <span>Search program</span>
          <input id="branchSearch" type="search" placeholder="Try CSE, ECE, Msc Maths, B.Pharm, Environmental..." />
        </label>
        <div class="count-pill" id="resultCount">15 programs</div>
      </div>
    </section>

    <section class="syllabus-list" id="syllabusGrid" aria-label="Branch syllabus PDF links"></section>
  </main>

  <script>
const branchData = [
  { title: 'Computer Science', icon: 'code', href: 'cse.pdf', type: 'B.E.', keywords: 'cs cse computer science programming data structures algorithms operating systems networks', accent: '#aaff32' },
  { title: 'Electronics & Communication', icon: 'signal', href: 'ece.pdf', type: 'B.E.', keywords: 'ece electronics communication signals systems microprocessors dsp digital signal processing', accent: '#35d8ff' },
  { title: 'Electronics & Computer Engineering', icon: 'compute', href: 'ecom.pdf', type: 'B.E.', keywords: 'ecom electronics computer engineering embedded systems networks microprocessors data structures algorithms', accent: '#35d8ff' },
  { title: 'Mathematics & Computing', icon: 'compute', href: 'mnc.pdf', type: 'B.E.', keywords: 'mnc mathematics computing math computation data science algorithms numerical analysis', accent: '#c8ff5b' },
  { title: 'Electrical & Electronics', icon: 'bolt', href: 'eee.pdf', type: 'B.E.', keywords: 'eee electrical electronics power systems electrical machines control systems analog electronics', accent: '#ffcf5a' },
  { title: 'Electronics & Instrumentation', icon: 'gauge', href: 'eni.pdf', type: 'B.E.', keywords: 'eni eie electronics instrumentation transducers measurement systems industrial instrumentation', accent: '#7c5cff' },
  { title: 'Mechanical Engineering', icon: 'gear', href: 'mechanical.pdf', type: 'B.E.', keywords: 'mech mechanical thermodynamics fluid mechanics machine design heat transfer cad', accent: '#ff7a5c' },
  { title: 'Manufacturing Engineering', icon: 'gear', href: 'manufacturing.pdf', type: 'B.E.', keywords: 'manufacturing machine tools automation control supply chain operations metrology quality', accent: '#ff7a5c' },
  { title: 'Civil Engineering', icon: 'bridge', href: 'civil.pdf', type: 'B.E.', keywords: 'civil structures surveying soil mechanics highway engineering hydraulics construction', accent: '#5cffb1' },
  { title: 'Chemical Engineering', icon: 'flask', href: 'chemical.pdf', type: 'B.E.', keywords: 'chemical process calculations thermodynamics fluid mechanics heat transfer separation processes', accent: '#ff5cc8' },
  { title: 'Environmental Engineering', icon: 'leaf', href: 'environmental.pdf', type: 'B.E.', keywords: 'be environmental sustainability engineering ecology pollution control environmental chemistry sustainable development biological sciences waste water treatment', accent: '#5cffb1' },
  { title: 'B.Pharm', icon: 'pill', href: 'B_Pharmacy.pdf', type: 'Pharmacy', keywords: 'bpharm b pharmacy pharmacy pharmaceutical pharmacology toxicology medicinal chemistry natural drugs formulations biopharmaceutics', accent: '#ff5cc8' },
  { title: 'Msc Maths', icon: 'math', href: 'MSc-MATH-COURSE-PACKAGE.pdf', type: 'Msc', keywords: 'msc mathematics maths math topology differential equations numerical analysis algebra probability statistics', accent: '#c8ff5b' },
  { title: 'Msc Chemistry', icon: 'molecule', href: 'MSc_Chemistry.pdf', type: 'Msc', keywords: 'msc chemistry organic inorganic physical chemistry thermodynamics quantum chemistry polymers', accent: '#ffcf5a' },
  { title: 'Msc Physics', icon: 'atom', href: 'MSc_Physics.pdf', type: 'Msc', keywords: 'msc physics quantum mechanics electromagnetics spectroscopy solid state nuclear optics', accent: '#35d8ff' },
  { title: 'Msc Semiconductor & Nanoscience', icon: 'atom', href: 'MSc_Semiconductor_Nanoscience.pdf', type: 'Msc', keywords: 'msc semiconductor nanoscience nanotechnology nanomaterials nanoscale nanophotonics fabrication devices', accent: '#35d8ff' },
  { title: 'Msc Biology', icon: 'dna', href: 'MSc_BioSc.pdf', type: 'Msc', keywords: 'msc biology biological sciences biosc cell biology genetics ecology microbiology physiology', accent: '#5cffb1' },
  { title: 'Msc Economics', icon: 'chart', href: 'MSc_Economics.pdf', type: 'Msc', keywords: 'msc economics microeconomics macroeconomics econometrics finance public finance international trade', accent: '#7c5cff' }
];

const subjectIcons = {
  code: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M19 16 11 24l8 8"/><path d="M29 16l8 8-8 8"/><path d="M26 12 22 36"/></svg>',
  signal: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M24 34V20"/><path d="M16 36h16"/><path d="M24 20l-7-8"/><path d="M24 20l7-8"/><path d="M12 18c-3 4-3 8 0 12"/><path d="M36 18c3 4 3 8 0 12"/><path d="M7 14c-5 7-5 13 0 20"/><path d="M41 14c5 7 5 13 0 20"/></svg>',
  compute: '<svg viewBox="0 0 48 48" aria-hidden="true"><rect x="9" y="12" width="30" height="20" rx="3"/><path d="M16 38h16"/><path d="M21 32v6"/><path d="M27 32v6"/><path d="M18 25h12"/><path d="M18 20h6"/></svg>',
  bolt: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M27 5 12 27h12l-3 16 15-23H24l3-15Z"/></svg>',
  gauge: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M10 34a16 16 0 1 1 28 0"/><path d="M24 30l9-10"/><path d="M16 34h16"/><path d="M14 25h3"/><path d="M31 25h3"/><path d="M24 16v3"/></svg>',
  gear: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M24 16a8 8 0 1 0 0 16 8 8 0 0 0 0-16Z"/><path d="M24 6v6"/><path d="M24 36v6"/><path d="M6 24h6"/><path d="M36 24h6"/><path d="M11 11l4 4"/><path d="M33 33l4 4"/><path d="M37 11l-4 4"/><path d="M15 33l-4 4"/></svg>',
  bridge: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M7 34h34"/><path d="M10 27h28"/><path d="M13 27c2-8 7-12 11-12s9 4 11 12"/><path d="M14 27v7"/><path d="M24 16v18"/><path d="M34 27v7"/></svg>',
  flask: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M20 7h8"/><path d="M21 7v12L12 35a4 4 0 0 0 3.5 6h17a4 4 0 0 0 3.5-6l-9-16V7"/><path d="M17 31h14"/><path d="M19 36h10"/></svg>',
  leaf: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M39 9C24 9 11 17 10 31c-.4 6 4 10 10 9 13-2 20-14 19-31Z"/><path d="M12 36c7-8 14-13 24-18"/><path d="M22 29c-1-3-1-6 0-9"/></svg>',
  pill: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M17 37 37 17a8 8 0 0 0-11-11L6 26a8 8 0 0 0 11 11Z"/><path d="M20 12l16 16"/><path d="M10 30h10"/><path d="M15 25v10"/></svg>',
  math: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M12 12h24"/><path d="M14 36h18"/><path d="M16 12l12 12-12 12"/><path d="M32 17c2-3 6-3 8 0"/><path d="M32 31c2 3 6 3 8 0"/></svg>',
  molecule: '<svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="15" cy="27" r="5"/><circle cx="30" cy="14" r="5"/><circle cx="34" cy="34" r="5"/><path d="M19 24l7-7"/><path d="M20 29l9 4"/></svg>',
  atom: '<svg viewBox="0 0 48 48" aria-hidden="true"><circle class="svg-fill" cx="24" cy="24" r="2.6"/><ellipse cx="24" cy="24" rx="17" ry="7"/><ellipse cx="24" cy="24" rx="17" ry="7" transform="rotate(60 24 24)"/><ellipse cx="24" cy="24" rx="17" ry="7" transform="rotate(120 24 24)"/></svg>',
  dna: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M15 8c18 8 18 24 0 32"/><path d="M33 8c-18 8-18 24 0 32"/><path d="M17 15h14"/><path d="M14 24h20"/><path d="M17 33h14"/></svg>',
  chart: '<svg viewBox="0 0 48 48" aria-hidden="true"><path d="M10 38h29"/><path d="M10 38V10"/><path d="M15 31l7-8 6 5 10-14"/><path d="M34 14h4v4"/></svg>'
};

const branchSearch = document.querySelector('#branchSearch');
const syllabusGrid = document.querySelector('#syllabusGrid');
const resultCount = document.querySelector('#resultCount');

function renderBranches() {
  const term = branchSearch.value.trim().toLowerCase();
  const branches = branchData.filter((branch) => {
    const haystack = `${branch.title} ${branch.code} ${branch.keywords}`.toLowerCase();
    return haystack.includes(term);
  });

  resultCount.textContent = `${branches.length} program${branches.length === 1 ? '' : 's'}`;
  syllabusGrid.innerHTML = branches.length ? branches.map((branch) => `
    <a class="syllabus-row" style="--card-accent: ${branch.accent}" href="${branch.href}" target="_blank" rel="noopener" aria-label="Open ${branch.title} syllabus PDF">
      <div class="branch-icon">${subjectIcons[branch.icon]}</div>
      <div class="branch-copy">
        <h2>${branch.title}</h2>
        <p><span class="branch-type">${branch.type} syllabus</span> · Open the official course package PDF for this programme.</p>
      </div>
      <div class="branch-meta"><span>PDF</span> →</div>
    </a>
  `).join('') : '<p class="empty">No matching branch found.</p>';
}

branchSearch.addEventListener('input', renderBranches);
renderBranches();
  </script>
</body>
</html>
