.brand, .nav-links a, .button { color: var(--text); text-decoration: none; }

  gap: 10px;

.brand-mark {

  place-items: center;

  transform: rotate(-7deg);
}
.brand-mark::before {
  content: "";
  position: absolute;
  inset: 6px;
  border-radius: 10px;
  border: 2px solid rgba(8, 9, 13, 0.58);
  transform: rotate(7deg);
}
.logo-peak {
  position: absolute;
  width: 20px;
  height: 20px;
  border-left: 5px solid #101406;
  border-top: 5px solid #101406;
  transform: translateY(4px) rotate(45deg);
  border-radius: 3px 0 0 0;
}
.logo-peak::after {
  content: "";
  position: absolute;
  width: 15px;
  height: 5px;
  border-radius: 999px;
  background: #101406;
  left: 2px;
  top: 7px;
  transform: rotate(-45deg);
}
.logo-spark {
  position: absolute;
  right: 8px;
  top: 7px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #101406;
  box-shadow: 0 0 0 3px rgba(16,20,6,0.18);
}
.brand-mark {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 42px;
  border-radius: 12px;
  overflow: hidden;
  background: rgba(255,255,255,0.96);
  box-shadow: 0 10px 24px rgba(0,0,0,0.22), inset 0 0 0 1px rgba(8,9,13,0.08);
  transform: none;
  flex: 0 0 auto;
  padding: 4px;
}
.brand-mark::before { display: none; }
.brand-mark img {
  width: 100%;
  height: 100%;

}

.nav-links { display: flex; gap: 6px; }
.nav-links a {

}

main { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }

.iteration-cutoff-link::after { content: none; }

.hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin: 28px 0 38px; }
.button {

  align-items: center;

  padding: 0 20px;

}

.stats-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; margin-top: 34px; }
.stat-card, .campus-card, .note, .trend-card, .compare {

  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  backdrop-filter: blur(22px);
}
.stat-card { border-radius: 22px; padding: 22px; }

.stat-card strong { display: block; font-size: 38px; letter-spacing: -0.06em; }
.stat-card p { margin: 8px 0 0; color: var(--muted); }

.controls { display: grid; gap: 18px; padding: 12px 0 18px; }
.control-row, .compare-controls { display: grid; grid-template-columns: 240px 1fr; gap: 12px; align-items: end; }
h2 { margin-bottom: 0; font-size: clamp(30px, 4vw, 44px); letter-spacing: -0.06em; }
.search-box, .select-box { display: grid; gap: 8px; color: var(--muted); font-size: 13px; font-weight: 700; }

  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 0 18px;
  background: rgba(255,255,255,0.055);
  color: var(--text);
  outline: none;
  font: inherit;
}
.select-box select { appearance: none; cursor: pointer; }
.search-box input:focus, .select-box select:focus { border-color: rgba(170,255,50,0.55); box-shadow: 0 0 0 4px var(--accent-soft); }

.campus-grid { display: grid; gap: 18px; padding-bottom: 38px; }
.campus-card { border-radius: var(--radius); overflow: hidden; }
.campus-card-head { display: flex; justify-content: space-between; align-items: start; gap: 16px; padding: 24px 24px 12px; }
h3 { margin-bottom: 0; font-size: 27px; letter-spacing: -0.05em; }
.pill {
  white-space: nowrap;
  padding: 8px 12px;
  border: 1px solid rgba(170,255,50,0.22);
  border-radius: 999px;
  background: var(--accent-soft);
  color: var(--accent);
  font-size: 13px;
  font-weight: 800;
}
.table-wrap { width: 100%; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 760px; }
th, td { padding: 15px 24px; text-align: left; border-top: 1px solid var(--line); }
th { color: var(--faint); font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; background: rgba(255,255,255,0.025); }
td { color: #e9ebf5; }
td:last-child, th:last-child { text-align: right; font-weight: 900; }
.comparison-table th:not(:first-child), .comparison-table td:not(:first-child) {
  text-align: right;
  width: 96px;
  font-weight: 900;
}
.comparison-table th:first-child, .comparison-table td:first-child {
  min-width: 330px;
}
.program-cell {
  position: sticky;
  left: 0;
  z-index: 1;
  background: rgba(17, 20, 29, 0.96);
}
.comparison-table thead th:first-child {
  position: sticky;
  left: 0;
  z-index: 2;
  background: rgba(20, 24, 34, 0.98);
}
.year-cell {
  font-variant-numeric: tabular-nums;
}
tbody tr:hover { background: rgba(255,255,255,0.04); }
.empty { padding: 26px; color: var(--muted); }

.compare { border-radius: var(--radius); padding: 28px; margin: 6px 0 18px; }
.section-head { display: flex; justify-content: space-between; gap: 20px; align-items: end; margin-bottom: 22px; }
.section-head p:last-child { max-width: 430px; color: var(--muted); line-height: 1.6; margin-bottom: 0; }
.compare-controls { grid-template-columns: 260px 1fr; margin-bottom: 16px; }
.trend-card { border-radius: 22px; padding: 20px; box-shadow: none; background: rgba(255,255,255,0.035); }
.trend-bars { display: grid; gap: 12px; }
.trend-row { display: grid; grid-template-columns: 92px 1fr 54px; align-items: center; gap: 12px; color: var(--muted); font-weight: 700; }
.track { height: 13px; border-radius: 999px; background: rgba(255,255,255,0.08); overflow: hidden; }
.fill { height: 100%; width: var(--w); border-radius: inherit; background: linear-gradient(90deg, var(--accent), rgba(170,255,50,0.55)); }
.score { color: var(--text); text-align: right; }

.note { border-radius: var(--radius); padding: 28px; margin: 18px 0 60px; }
.note p:last-child { margin-bottom: 0; max-width: 860px; color: var(--muted); line-height: 1.7; }

@media (max-width: 820px) {

}

const years = Object.keys(cutoffData).sort().reverse();
const campuses = ["Pilani", "Goa", "Hyderabad"];
const campusSelect = document.querySelector('#campusSelect');
const searchInput = document.querySelector('#searchInput');
const campusGrid = document.querySelector('#campusGrid');
const compareCampus = document.querySelector('#compareCampus');
const compareProgram = document.querySelector('#compareProgram');
const trendBars = document.querySelector('#trendBars');

function normalizeProgram(program) {
  return program.replace(/&/g, 'and').replace(/\s+/g, ' ').trim().toLowerCase();
}

function isVisibleProgram(program) {
  return Boolean(program);
}

function allProgramsForCampus(campus) {
  const byKey = new Map();
  years.forEach((year) => {
    cutoffData[year][campus].forEach(([program]) => {
      if (!isVisibleProgram(program)) return;
      const key = normalizeProgram(program);
      if (!byKey.has(key)) byKey.set(key, program);
    });
  });
  return [...byKey.values()].sort((a, b) => a.localeCompare(b));
}

function scoreFor(year, campus, program) {
  if (!isVisibleProgram(program)) return null;
  const target = normalizeProgram(program);
  const row = cutoffData[year][campus].find(([name]) => isVisibleProgram(name) && normalizeProgram(name) === target);
  return row ? row[1] : null;
}

function renderComparisonTables() {
  const selectedCampus = campusSelect.value;
  const term = searchInput.value.trim().toLowerCase();
  const campusesToRender = selectedCampus === "All" ? campuses : [selectedCampus];

  campusGrid.innerHTML = campusesToRender.map((campus) => {
    const programs = allProgramsForCampus(campus).filter((program) => program.toLowerCase().includes(term));
    const tableRows = programs.map((program) => {
      const cells = years.map((year) => {
        const score = scoreFor(year, campus, program);
        return `<td class="year-cell">${score ?? '-'}</td>`;
      }).join('');
      return `<tr><td class="program-cell">${program}</td>${cells}</tr>`;
    }).join('');

    const yearHeadings = years.map((year) => `<th>${year.slice(0, 4)}</th>`).join('');

    return `
      <article class="campus-card" id="${campus.toLowerCase()}">
        <div class="campus-card-head">
          <div>
            <p class="eyebrow">All years</p>
            <h3>BITS ${campus === 'Goa' ? 'K K Birla Goa' : campus}</h3>
          </div>
          <span class="pill">${programs.length} programmes</span>
        </div>
        ${programs.length ? `
          <div class="table-wrap">
            <table class="comparison-table">
              <thead><tr><th>Branch / Program</th>${yearHeadings}</tr></thead>
              <tbody>${tableRows}</tbody>
            </table>
          </div>` : `<p class="empty">No matching programmes for this search.</p>`}
      </article>
    `;
  }).join('');
}


function populateComparisonControls() {
  compareCampus.innerHTML = campuses.map((campus) => `<option value="${campus}">${campus === 'Goa' ? 'K K Birla Goa' : campus}</option>`).join('');
  updateProgramOptions();
}

function updateProgramOptions() {
  const campus = compareCampus.value || campuses[0];
  const previous = compareProgram.value;
  const programs = allProgramsForCampus(campus);
  compareProgram.innerHTML = programs.map((program) => `<option value="${program}">${program}</option>`).join('');
  if (programs.includes(previous)) compareProgram.value = previous;
  else {
    const cse = programs.find((program) => normalizeProgram(program).includes('computer science'));
    compareProgram.value = cse || programs[0] || '';
  }
  renderTrendChart();
}

function renderTrendChart() {
  const campus = compareCampus.value || campuses[0];
  const program = compareProgram.value;
  if (!program) {
    trendBars.innerHTML = '<p class="empty">No branch selected.</p>';
    return;
  }

  const rows = years.map((year) => ({ year, score: scoreFor(year, campus, program) }));
  const numericScores = rows.map((row) => row.score).filter((score) => typeof score === 'number');
  const maxScore = Math.max(...numericScores, 1);

  trendBars.innerHTML = rows.map(({ year, score }) => {
    const width = score ? Math.max(8, Math.round((score / maxScore) * 100)) : 0;
    return `
      <div class="trend-row">
        <span>${year.slice(0, 4)}</span>
        <div class="track" aria-hidden="true"><div class="fill" style="--w: ${width}%"></div></div>
        <span class="score">${score ?? '-'}</span>
      </div>
    `;
  }).join('');
}

[campusSelect, searchInput].forEach((control) => control.addEventListener('input', renderComparisonTables));
compareCampus.addEventListener('change', updateProgramOptions);
compareProgram.addEventListener('change', renderTrendChart);
